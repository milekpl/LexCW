{% extends "base.html" %}

{% block title %}Forgot Password - Lexicographic Curation Workbench{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0"><i class="fas fa-key"></i> Forgot Password</h4>
      </div>
      <div class="card-body">
        <p class="text-muted mb-4">
          Enter your email address and we'll send you a link to reset your password.
        </p>

        <form method="POST" action="{{ url_for('auth.forgot_password') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              required
              autofocus
              placeholder="Enter your email"
            />
          </div>

          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>
          </div>
        </form>
      </div>
      <div class="card-footer text-center">
        <small class="text-muted">
          Remember your password?
          <a href="{{ url_for('auth.login') }}">Login here</a>
        </small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
