{# Alpine.js pronunciation component #}
{# IPA validation wired via @input/@blur -> validateIpaField() from ipa-validation.js #}

<div x-data="pronunciation(window.__entryData || {})" class="card mb-4 pronunciation-section border-0 shadow-sm">
    <div class="card-header bg-white border-bottom border-2 d-flex align-items-center gap-2 py-3">
        <span class="d-inline-flex align-items-center justify-content-center rounded-circle bg-info bg-opacity-10" style="width:32px;height:32px">
            <i class="fas fa-microphone text-info"></i>
        </span>
        <h5 class="mb-0 fw-semibold">Pronunciation</h5>
    </div>
    <div class="card-body">
        <div id="pronunciation-container">
            <template x-for="(item, pi) in items" :key="item.id">
                <div class="pronunciation-item mb-3 pb-3" :data-index="pi"
                     x-bind:class="pi < items.length - 1 ? 'border-bottom' : ''">
                    <!-- Header row -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="d-flex align-items-center gap-2">
                            <span class="badge bg-light text-muted rounded-pill px-3 py-1 fw-normal"
                                  x-text="'#' + (pi + 1)"></span>
                            <span class="text-muted small">Pronunciation</span>
                        </div>
                        <div class="d-flex gap-1">
                            <button type="button" class="btn btn-sm btn-light border move-up-btn"
                                    @click.prevent="if(pi > 0) { var m = items.splice(pi, 1)[0]; items.splice(pi - 1, 0, m); }"
                                    title="Move Up"
                                    x-bind:disabled="pi === 0">&uarr;</button>
                            <button type="button" class="btn btn-sm btn-light border move-down-btn"
                                    @click.prevent="if(pi < items.length - 1) { var m = items.splice(pi, 1)[0]; items.splice(pi + 1, 0, m); }"
                                    title="Move Down"
                                    x-bind:disabled="pi === items.length - 1">&darr;</button>
                        </div>
                    </div>

                    <!-- IPA Input -->
                    <div class="mb-2">
                        <label class="form-label small fw-medium text-secondary mb-1">IPA transcription</label>
                        <div class="input-group">
                            <input type="text" class="form-control bg-light bg-opacity-25 border-end-0 ipa-input"
                                   x-model="item.value"
                                   @input="validateIpa($el)"
                                   @blur="validateIpa($el)"
                                   placeholder="e.g. ˈskɒtɪˌsɪz(ə)m">
                            <input type="hidden" x-model="item.type">
                            <button class="btn btn-outline-info border" type="button"
                                    :data-predict-ipa="pi"
                                    @click.prevent="predictIpa(pi)"
                                    title="Predict IPA from headword using AI model">
                                <i class="fas fa-magic"></i> <span class="d-none d-md-inline">Predict</span>
                            </button>
                        </div>
                    </div>

                    <!-- Audio row (compact) -->
                    <div class="mb-3">
                        <label class="form-label small fw-medium text-secondary mb-1">Audio</label>
                        <div class="d-flex align-items-center gap-2">
                            <div class="flex-grow-1 text-truncate text-muted small px-2 py-1 bg-light bg-opacity-25 rounded border"
                                 x-text="item.audioPath || 'No audio file attached'"></div>
                            <button class="btn btn-sm btn-light border upload-audio-btn" type="button"
                                    :data-index="pi" title="Upload audio file">
                                <i class="fas fa-upload"></i>
                            </button>
                            <button class="btn btn-sm btn-light border generate-audio-btn" type="button"
                                    :data-index="pi" title="Generate audio from IPA">
                                <i class="fas fa-waveform"></i>
                            </button>
                        </div>
                    </div>

                    <!-- LIFT extras (CV pattern + Tone) — collapsed behind a toggle -->
                    <div class="mb-2">
                        <button type="button" class="btn btn-sm btn-link text-decoration-none text-muted p-0"
                                @click.prevent="item._showExtras = !item._showExtras">
                            <i class="fas fa-chevron-down small me-1"
                               x-bind:class="{'fa-chevron-down': !item._showExtras, 'fa-chevron-up': item._showExtras}"></i>
                            <span x-text="item._showExtras ? 'Hide' : 'Show'"></span> advanced fields
                        </button>
                    </div>
                    <template x-if="item._showExtras">
                        <div class="bg-light bg-opacity-25 rounded p-3 mb-3 border">
                            <!-- CV Pattern -->
                            <div class="mb-3">
                                <label class="form-label small fw-medium text-secondary mb-1">CV Pattern</label>
                                <div class="multilingual-forms cv-pattern-forms" :data-pron-index="pi">
                                    <template x-for="cv in item.cvPattern" :key="cv.id">
                                        <div class="d-flex align-items-center gap-2 mb-2" :data-lang="cv.lang">
                                            <span class="badge bg-light text-muted border px-2" style="min-width:2.5rem" x-text="cv.lang"></span>
                                            <input type="text" class="form-control form-control-sm bg-white"
                                                   x-model="cv.text" :placeholder="'CV pattern in ' + cv.lang">
                                            <button type="button" class="btn btn-sm btn-outline-danger flex-shrink-0"
                                                    @click.prevent="removeRow(item.cvPattern, cv.id)"
                                                    x-show="item.cvPattern.length > 1">&times;</button>
                                        </div>
                                    </template>
                                </div>
                                <button type="button" class="btn btn-sm btn-outline-primary mt-1 add-cv-pattern-language-btn"
                                        @click.prevent="addRow(item.cvPattern)" :data-pron-index="pi">
                                    <i class="fas fa-plus"></i> Add Language
                                </button>
                                <div class="form-text small mt-1">Syllable structure pattern (C = consonant, V = vowel).</div>
                            </div>

                            <!-- Tone -->
                            <div>
                                <label class="form-label small fw-medium text-secondary mb-1">Tone</label>
                                <div class="multilingual-forms tone-forms" :data-pron-index="pi">
                                    <template x-for="t in item.tone" :key="t.id">
                                        <div class="d-flex align-items-center gap-2 mb-2" :data-lang="t.lang">
                                            <span class="badge bg-light text-muted border px-2" style="min-width:2.5rem" x-text="t.lang"></span>
                                            <input type="text" class="form-control form-control-sm bg-white"
                                                   x-model="t.text" :placeholder="'Tone in ' + t.lang">
                                            <button type="button" class="btn btn-sm btn-outline-danger flex-shrink-0"
                                                    @click.prevent="removeRow(item.tone, t.id)"
                                                    x-show="item.tone.length > 1">&times;</button>
                                        </div>
                                    </template>
                                </div>
                                <button type="button" class="btn btn-sm btn-outline-primary mt-1 add-tone-language-btn"
                                        @click.prevent="addRow(item.tone)" :data-pron-index="pi">
                                    <i class="fas fa-plus"></i> Add Language
                                </button>
                                <div class="form-text small mt-1">Tone marking for tone languages.</div>
                            </div>
                        </div>
                    </template>

                    <!-- Bottom row: default checkbox + remove -->
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <div class="form-check mb-0">
                            <input class="form-check-input" type="checkbox" value="1"
                                   :id="'pron-default-' + pi"
                                   x-model="item.isDefault">
                            <label class="form-check-label small" :for="'pron-default-' + pi">
                                Default pronunciation
                            </label>
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-danger remove-pronunciation-btn"
                                @click.prevent="removeItem(item.id)" :data-index="pi"
                                x-show="items.length > 1">
                            <i class="fas fa-trash"></i> Remove
                        </button>
                    </div>
                </div>
            </template>

            <div class="text-center py-4 text-muted border rounded bg-light bg-opacity-25"
                 id="no-pronunciations-message" x-show="items.length === 0">
                <i class="fas fa-microphone-slash fs-4 d-block mb-2"></i>
                <p class="mb-0 small">No pronunciations yet.</p>
                <p class="small">Click the button below to add one.</p>
            </div>
        </div>

        <button type="button" class="btn btn-outline-primary mt-2" id="add-pronunciation-btn"
                @click.prevent="addItem()">
            <i class="fas fa-plus"></i> Add Pronunciation
        </button>
    </div>
</div>
