{# Alpine.js pronunciation component (Stage 2.2) #}
{# IPA validation wired via @input/@blur → validateIpaField() from ipa-validation.js #}

<div x-data="pronunciation(window.__entryData || {})" class="card mb-4 pronunciation-section">
    <div class="card-header bg-info text-white">
        <h5><i class="fas fa-microphone"></i> Pronunciation</h5>
    </div>
    <div class="card-body">
        <div id="pronunciation-container">
            <template x-for="(item, pi) in items" :key="item.id">
                <div class="pronunciation-item mb-3 border-bottom pb-3" :data-index="pi">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="fw-bold" x-text="'Pronunciation ' + (pi + 1)"></span>
                        <div>
                            <button type="button" class="btn btn-sm btn-secondary move-up-btn"
                                    @click.prevent="if(pi > 0) { var m = items.splice(pi, 1)[0]; items.splice(pi - 1, 0, m); }"
                                    title="Move Up">↑</button>
                            <button type="button" class="btn btn-sm btn-secondary move-down-btn"
                                    @click.prevent="if(pi < items.length - 1) { var m = items.splice(pi, 1)[0]; items.splice(pi + 1, 0, m); }"
                                    title="Move Down">↓</button>
                        </div>
                    </div>

                    <!-- IPA Input -->
                    <div class="row">
                        <div class="col-12">
                            <label class="form-label">IPA</label>
                            <input type="text" class="form-control ipa-input"
                                   x-model="item.value"
                                   @input="validateIpa($el)"
                                   @blur="validateIpa($el)"
                                   placeholder="IPA transcription">
                            <input type="hidden" x-model="item.type">
                            <div class="form-text">International Phonetic Alphabet (IPA)</div>
                        </div>
                    </div>

                    <!-- Audio File (legacy — server endpoints for upload/generate) -->
                    <div class="mt-2 mb-2">
                        <label class="form-label">Audio File</label>
                        <div class="input-group">
                            <input type="text" class="form-control"
                                   x-model="item.audioPath" readonly placeholder="No audio file">
                            <button class="btn btn-outline-secondary upload-audio-btn" type="button"
                                    :data-index="pi" title="Upload audio file">
                                <i class="fas fa-upload"></i> Upload
                            </button>
                            <button class="btn btn-outline-secondary generate-audio-btn" type="button"
                                    :data-index="pi" title="Generate audio from IPA">
                                <i class="fas fa-magic"></i> Generate
                            </button>
                        </div>
                    </div>

                    <!-- LIFT 0.13: CV Pattern -->
                    <div class="mt-3 mb-2">
                        <label class="form-label">CV Pattern</label>
                        <div class="multilingual-forms cv-pattern-forms" :data-pron-index="pi">
                            <template x-for="cv in item.cvPattern" :key="cv.id">
                                <div class="language-form-group mb-2 border rounded p-2" :data-lang="cv.lang">
                                    <div class="input-group">
                                        <span class="input-group-text" x-text="cv.lang"></span>
                                        <input type="text" class="form-control"
                                               x-model="cv.text" :placeholder="'CV pattern in ' + cv.lang">
                                        <button type="button" class="btn btn-outline-danger"
                                                @click.prevent="removeRow(item.cvPattern, cv.id)"
                                                x-show="item.cvPattern.length > 1">×</button>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-primary add-cv-pattern-language-btn"
                                @click.prevent="addRow(item.cvPattern)" :data-pron-index="pi">
                            <i class="fas fa-plus"></i> Add Language
                        </button>
                        <div class="form-text small">Syllable structure pattern (Consonant-Vowel notation).</div>
                    </div>

                    <!-- LIFT 0.13: Tone -->
                    <div class="mt-3 mb-2">
                        <label class="form-label">Tone</label>
                        <div class="multilingual-forms tone-forms" :data-pron-index="pi">
                            <template x-for="t in item.tone" :key="t.id">
                                <div class="language-form-group mb-2 border rounded p-2" :data-lang="t.lang">
                                    <div class="input-group">
                                        <span class="input-group-text" x-text="t.lang"></span>
                                        <input type="text" class="form-control"
                                               x-model="t.text" :placeholder="'Tone in ' + t.lang">
                                        <button type="button" class="btn btn-outline-danger"
                                                @click.prevent="removeRow(item.tone, t.id)"
                                                x-show="item.tone.length > 1">×</button>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-primary add-tone-language-btn"
                                @click.prevent="addRow(item.tone)" :data-pron-index="pi">
                            <i class="fas fa-plus"></i> Add Language
                        </button>
                        <div class="form-text small">Tone marking for tone languages.</div>
                    </div>

                    <!-- Default checkbox -->
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="1"
                               :id="'pron-default-' + pi"
                               x-model="item.isDefault">
                        <label class="form-check-label" :for="'pron-default-' + pi">
                            Default pronunciation
                        </label>
                    </div>

                    <!-- Remove button (hide for first item) -->
                    <div class="mt-2" x-show="items.length > 1">
                        <button type="button" class="btn btn-sm btn-outline-danger remove-pronunciation-btn"
                                @click.prevent="removeItem(item.id)" :data-index="pi">
                            <i class="fas fa-trash"></i> Remove
                        </button>
                    </div>
                </div>
            </template>

            <div class="text-muted mb-3" id="no-pronunciations-message" x-show="items.length === 0">
                No pronunciations added yet. Click "Add Pronunciation" to get started.
            </div>
        </div>

        <button type="button" class="btn btn-sm btn-primary" id="add-pronunciation-btn"
                @click.prevent="addItem()">
            <i class="fas fa-plus"></i> Add Pronunciation
        </button>
    </div>
</div>
