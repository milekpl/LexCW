{# Alpine.js sense tree component — owns the entire senses subtree (§4.1, §10) #}
{# Server-rendered senses are replaced by Alpine x-for from #entry-data JSON #}

{# Entry data as JSON for Alpine — must be before the Alpine component in DOM order #}
<script id="entry-data" type="application/json">{{ entry.to_dict() | tojson | safe }}</script>
<script>
  (function() {
    var el = document.getElementById('entry-data');
    window.__entryData = el ? JSON.parse(el.textContent) : {};
  })();
</script>

<div class="card senses-section"
     x-data="senseTree(window.__entryData || {})">
  <div class="card-header bg-primary text-white">
    <div class="d-flex justify-content-between align-items-center">
      <h5 class="mb-0"><i class="fas fa-lightbulb"></i> Senses</h5>
      <div>
        <button type="button" class="btn btn-sm btn-outline-light me-2" id="merge-senses-btn"
                title="Merge senses within this entry">
          <i class="fas fa-layer-group"></i> Merge Senses
        </button>
        <button type="button" class="btn btn-sm btn-light" id="add-sense-btn"
                data-shortcut="ctrl+shift+n"
                @click.prevent="addSense()">
          <i class="fas fa-plus"></i> Add Sense
        </button>
      </div>
    </div>
  </div>

  <div class="card-body">
    <div id="senses-container">
      <template x-for="(sense, si) in senses" :key="sense.id">
        <div class="sense-item card mb-4" :data-sense-index="si">
          <div class="card-header bg-light">
            <div class="d-flex justify-content-between align-items-center">
              <div class="d-flex align-items-center">
                <div class="drag-handle me-2" title="Drag to reorder" style="cursor: grab;">
                  <i class="fas fa-grip-vertical text-muted"></i>
                </div>
                <h6 class="mb-0" x-text="'Sense ' + (si + 1)"></h6>
              </div>
              <div>
                <button type="button" class="btn btn-sm btn-secondary move-sense-up"
                        title="Move Up" @click.prevent="if(si > 0) reorderSenses(si, si - 1)">↑</button>
                <button type="button" class="btn btn-sm btn-secondary move-sense-down"
                        title="Move Down" @click.prevent="if(si < senses.length - 1) reorderSenses(si, si + 1)">↓</button>
                <button type="button" class="btn btn-sm btn-outline-success split-sense-btn"
                        title="Split Sense to New Entry" :data-sense-id="sense.id">
                  <i class="fas fa-code-branch"></i> Split
                </button>
                <button type="button" class="btn btn-sm btn-outline-danger remove-sense-btn"
                        x-show="senses.length > 1"
                        @click.prevent="removeSense(sense.id)">
                  <i class="fas fa-trash"></i> Remove
                </button>
              </div>
            </div>
          </div>

          <div class="card-body">
            <!-- Definition (multilingual) -->
            <div class="mb-3" data-section-id="senses" data-field-id="sense-definition">
              <label class="form-label">Definition <span class="text-danger">*</span></label>
              <div class="multilingual-forms definition-forms">
                <template x-for="df in sense.definitionForms" :key="df.id">
                  <div class="mb-3 language-form" :data-language="df.lang">
                    <div class="row">
                      <div class="col-md-3">
                        <label class="form-label">Language</label>
                        <select class="form-select language-select" x-model="df.lang"
>
                          <template x-for="opt in languageOptions" :key="opt.code">
                            <option :value="opt.code" x-text="opt.label"
                                    :selected="opt.code === df.lang"></option>
                          </template>
                        </select>
                      </div>
                      <div class="col-md-8">
                        <label class="form-label">Definition Text</label>
                        <textarea class="form-control definition-text"

                                  x-model="df.text" rows="2" required
                                  :placeholder="'Enter definition in ' + df.lang"></textarea>
                      </div>
                      <div class="col-md-1 d-flex align-items-end"
                           x-show="sense.definitionForms.length > 1">
                        <button type="button" class="btn btn-sm btn-outline-danger remove-definition-language-btn remove-language-btn"
                                title="Remove language" @click.prevent="removeRow(sense.definitionForms, df.id)">
                          <i class="fas fa-times"></i>
                        </button>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
              <div class="mt-2 d-flex gap-2">
                <button type="button" class="btn btn-sm btn-outline-primary add-definition-language-btn"
                        @click.prevent="addRow(sense.definitionForms)"
                        title="Add another language">
                  <i class="fas fa-plus"></i> Add Language
                </button>
                <button type="button" class="btn btn-sm btn-outline-secondary search-corpus-btn"
                        :data-sense-index="si" data-field="definition"
                        title="Search corpus for usage examples">
                  <i class="fas fa-search"></i> Search Corpus
                </button>
              </div>
            </div>

            <!-- Gloss (multilingual) -->
            <div class="mb-3" data-section-id="senses" data-field-id="sense-gloss">
              <label class="form-label">Gloss</label>
              <div class="multilingual-forms gloss-forms">
                <template x-for="gf in sense.glossForms" :key="gf.id">
                  <div class="mb-3 language-form" :data-language="gf.lang">
                    <div class="row">
                      <div class="col-md-3">
                        <label class="form-label">Language</label>
                        <select class="form-select language-select" x-model="gf.lang"
>
                          <template x-for="opt in languageOptions" :key="opt.code">
                            <option :value="opt.code" x-text="opt.label"
                                    :selected="opt.code === gf.lang"></option>
                          </template>
                        </select>
                      </div>
                      <div class="col-md-8">
                        <label class="form-label">Gloss Text</label>
                        <input type="text" class="form-control gloss-text"

                               x-model="gf.text"
                               :placeholder="'Enter gloss in ' + gf.lang">
                      </div>
                      <div class="col-md-1 d-flex align-items-end"
                           x-show="sense.glossForms.length > 1">
                        <button type="button" class="btn btn-sm btn-outline-danger remove-gloss-language-btn remove-language-btn"
                                title="Remove language" @click.prevent="removeRow(sense.glossForms, gf.id)">
                          <i class="fas fa-times"></i>
                        </button>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
              <div class="mt-2">
                <button type="button" class="btn btn-sm btn-outline-primary add-gloss-language-btn"
                        @click.prevent="addRow(sense.glossForms)"
                        title="Add another language">
                  <i class="fas fa-plus"></i> Add Language
                </button>
              </div>
            </div>

            <!-- Grammatical Info (x-model, options from reactive rangeData) -->
            <div class="mb-3">
              <label class="form-label">Part of Speech</label>
              <select class="form-select sense-grammatical-info-select dynamic-grammatical-info"
                      x-model="sense.grammaticalInfo">
                <option value="">Select part of speech</option>
                <template x-for="opt in grammaticalInfoOptions" :key="opt.key">
                  <option :value="opt.value" x-text="opt.label"></option>
                </template>
              </select>
            </div>

            <!-- Domain Type (x-model, options from reactive rangeData) -->
            <div class="mb-3">
              <label class="form-label">Domain Type</label>
              <select class="form-select sense-domain-type-select"
                      x-model="sense.domainType"
                      multiple>
                <template x-for="opt in domainTypeOptions" :key="opt.key">
                  <option :value="opt.value" x-text="opt.label"></option>
                </template>
              </select>
              <div class="form-text">Academic or disciplinary domain this sense belongs to.</div>
            </div>

            <!-- Semantic Domain (x-model, options from reactive rangeData) -->
            <div class="mb-3">
              <label class="form-label">Semantic Domain</label>
              <select class="form-select sense-semantic-domain-select"
                      x-model="sense.semanticDomains"
                      multiple>
                <template x-for="opt in semanticDomainOptions" :key="opt.key">
                  <option :value="opt.value" x-text="opt.label"></option>
                </template>
              </select>
              <div class="form-text">Semantic categorization for this sense.</div>
            </div>

            <!-- Usage Type (x-model, options from reactive rangeData) -->
            <div class="mb-3">
              <label class="form-label">Usage Type</label>
              <select class="form-select sense-usage-type-select"
                      x-model="sense.usageType"
                      multiple>
                <template x-for="opt in usageTypeOptions" :key="opt.key">
                  <option :value="opt.value" x-text="opt.label"></option>
                </template>
              </select>
              <div class="form-text">Usage classification for this sense.</div>
            </div>

            <!-- Sense Note (multilingual) -->
            <div class="mb-3">
              <label class="form-label">Sense Note</label>
              <div class="multilingual-forms">
                <template x-for="nf in sense.noteForms" :key="nf.id">
                  <div class="input-group mb-1">
                    <span class="input-group-text" x-text="nf.lang"></span>
                    <textarea class="form-control" x-model="nf.text" rows="2"

                              :placeholder="'Note in ' + nf.lang"></textarea>
                    <button type="button" class="btn btn-outline-danger"
                            @click.prevent="removeRow(sense.noteForms, nf.id)"
                            x-show="sense.noteForms.length > 0">×</button>
                  </div>
                </template>
              </div>
              <button type="button" class="btn btn-sm btn-outline-primary mt-1"
                      @click.prevent="addRow(sense.noteForms)">
                <i class="fas fa-plus"></i> Add Language
              </button>
            </div>

            <!-- Literal Meaning (multilingual) -->
            <div class="mb-3">
              <label class="form-label">Literal Meaning</label>
              <div class="multilingual-forms">
                <template x-for="lm in sense.literalMeaningForms" :key="lm.id">
                  <div class="input-group mb-1">
                    <span class="input-group-text" x-text="lm.lang"></span>
                    <input type="text" class="form-control" x-model="lm.text"

                           :placeholder="'Literal meaning in ' + lm.lang">
                    <button type="button" class="btn btn-outline-danger"
                            @click.prevent="removeRow(sense.literalMeaningForms, lm.id)"
                            x-show="sense.literalMeaningForms.length > 0">×</button>
                  </div>
                </template>
              </div>
              <button type="button" class="btn btn-sm btn-outline-primary mt-1"
                      @click.prevent="addRow(sense.literalMeaningForms)">
                <i class="fas fa-plus"></i> Add Language
              </button>
              <div class="form-text">The literal/compositional meaning of idioms or compound words.</div>
            </div>

            <!-- Exemplar (multilingual) -->
            <div class="mb-3">
              <label class="form-label">Exemplar</label>
              <div class="multilingual-forms">
                <template x-for="ef in sense.exemplarForms" :key="ef.id">
                  <div class="input-group mb-1">
                    <span class="input-group-text" x-text="ef.lang"></span>
                    <input type="text" class="form-control" x-model="ef.text"

                           :placeholder="'Exemplar in ' + ef.lang">
                    <button type="button" class="btn btn-outline-danger"
                            @click.prevent="removeRow(sense.exemplarForms, ef.id)"
                            x-show="sense.exemplarForms.length > 0">×</button>
                  </div>
                </template>
              </div>
              <button type="button" class="btn btn-sm btn-outline-primary mt-1"
                      @click.prevent="addRow(sense.exemplarForms)">
                <i class="fas fa-plus"></i> Add Language
              </button>
              <div class="form-text">Specific inflected form this sense applies to.</div>
            </div>

            <!-- Scientific Name (multilingual) -->
            <div class="mb-3">
              <label class="form-label">Scientific Name</label>
              <div class="multilingual-forms">
                <template x-for="sn in sense.scientificNameForms" :key="sn.id">
                  <div class="input-group mb-1">
                    <span class="input-group-text" x-text="sn.lang"></span>
                    <input type="text" class="form-control" x-model="sn.text"

                           :placeholder="'Scientific name in ' + sn.lang">
                    <button type="button" class="btn btn-outline-danger"
                            @click.prevent="removeRow(sense.scientificNameForms, sn.id)"
                            x-show="sense.scientificNameForms.length > 0">×</button>
                  </div>
                </template>
              </div>
              <button type="button" class="btn btn-sm btn-outline-primary mt-1"
                      @click.prevent="addRow(sense.scientificNameForms)">
                <i class="fas fa-plus"></i> Add Language
              </button>
              <div class="form-text">Scientific/Latin name for biological or taxonomic terms.</div>
            </div>

            <!-- Sense Relations -->
            <div class="mb-3 relations-section">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="form-label mb-0"><i class="fas fa-link"></i> Relations</label>
                <button type="button" class="btn btn-sm btn-outline-primary add-sense-relation-btn"
                        @click.prevent="addRelation(sense)">
                  <i class="fas fa-plus"></i> Add Relation
                </button>
              </div>
              <div class="sense-relations-container">
                <template x-for="(rel, ri) in sense.relations" :key="rel.id">
                  <div class="sense-relation-item card mb-2 border-warning">
                    <div class="card-header bg-warning bg-opacity-10 py-1">
                      <div class="d-flex justify-content-between align-items-center">
                        <small><i class="fas fa-link"></i> <span x-text="'Relation ' + (ri + 1)"></span></small>
                        <button type="button" class="btn btn-sm btn-outline-danger remove-sense-relation-btn"
                                @click.prevent="removeRelation(sense, rel.id)">
                          <i class="fas fa-times"></i>
                        </button>
                      </div>
                    </div>
                    <div class="card-body py-2">
                      <div class="row">
                        <div class="col-md-5">
                          <select class="form-select form-select-sm sense-relation-type-select"
                                  x-model="rel.type">
                            <option value="">Select type</option>
                            <template x-for="opt in relationTypeOptions" :key="opt.key">
                              <option :value="opt.value" x-text="opt.label"></option>
                            </template>
                          </select>
                        </div>
                        <div class="col-md-7">
                          <input type="text" class="form-control form-control-sm sense-relation-ref"
                                 x-model="rel.ref"
                                 placeholder="Target entry ID">
                        </div>
                      </div>
                    </div>
                  </div>
                </template>
                <div class="text-muted small" x-show="!sense.relations || sense.relations.length === 0">
                  No relations yet.
                </div>
              </div>
            </div>

            <!-- Sense Annotations -->
            <div class="mb-3 sense-annotations-section">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="form-label mb-0"><i class="fas fa-clipboard-list"></i> Annotations</label>
                <button type="button" class="btn btn-sm btn-outline-warning add-annotation-btn"
                        @click.prevent="addAnnotation(sense)">
                  <i class="fas fa-plus"></i> Add Annotation
                </button>
              </div>
              <template x-for="(ann, ai) in sense.annotations" :key="ann.id">
                <div class="annotation-item card mb-2 border-warning">
                  <div class="card-body py-2">
                    <div class="row g-2 mb-2">
                      <div class="col-md-4">
                        <input type="text" class="form-control form-control-sm annotation-name-input"
                               x-model="ann.name" placeholder="name (e.g. review-status)">
                      </div>
                      <div class="col-md-4">
                        <input type="text" class="form-control form-control-sm annotation-value-input"
                               x-model="ann.value" placeholder="value">
                      </div>
                      <div class="col-md-3">
                        <input type="text" class="form-control form-control-sm annotation-who-input"
                               x-model="ann.who" placeholder="who">
                      </div>
                      <div class="col-md-1 d-flex align-items-center">
                        <button type="button" class="btn btn-sm btn-outline-danger remove-annotation-btn"
                                @click.prevent="removeAnnotation(sense, ann.id)">×</button>
                      </div>
                    </div>
                    <!-- Multilingual annotation content -->
                    <div class="annotation-content-section border-top pt-2">
                      <div class="d-flex justify-content-between align-items-center mb-1">
                        <small class="text-muted fw-bold">Content</small>
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                                @click.prevent="addAnnotationContentRow(ann)">
                          <i class="fas fa-plus"></i> Add Language
                        </button>
                      </div>
                      <template x-for="cf in ann.contentForms" :key="cf.id">
                        <div class="input-group input-group-sm mb-1">
                          <select class="form-select form-select-sm" style="max-width: 90px;" x-model="cf.lang">
                            <template x-for="opt in languageOptions" :key="opt.code">
                              <option :value="opt.code" x-text="opt.label"
                                      :selected="opt.code === cf.lang"></option>
                            </template>
                          </select>
                          <input type="text" class="form-control form-control-sm" x-model="cf.text"
                                 :placeholder="'Content in ' + cf.lang">
                          <button type="button" class="btn btn-sm btn-outline-danger"
                                  @click.prevent="removeAnnotationContentRow(ann, cf.id)"
                                  x-show="ann.contentForms.length > 1">×</button>
                        </div>
                      </template>
                      <small class="text-muted" x-show="!ann.contentForms || ann.contentForms.length === 0">
                        No content yet.
                      </small>
                    </div>
                  </div>
                </div>
              </template>
              <div class="text-muted small" x-show="!sense.annotations || sense.annotations.length === 0">
                No annotations yet.
              </div>
            </div>

            <!-- Examples -->
            <div class="mb-3 examples-section">
              <label class="form-label">Examples</label>
              <div class="examples-container">
                <template x-for="(ex, ei) in sense.examples" :key="ex.id">
                  <div class="example-item card mb-3">
                    <div class="card-header bg-light py-2">
                      <div class="d-flex justify-content-between align-items-center">
                        <small x-text="'Example ' + (ei + 1)"></small>
                        <button type="button" class="btn btn-sm btn-outline-danger remove-example-btn"
                                @click.prevent="removeExample(sense, ex.id)">
                          <i class="fas fa-times"></i>
                        </button>
                      </div>
                    </div>
                    <div class="card-body">
                      <!-- Example Sentence -->
                      <div class="mb-2">
                        <label class="form-label">Example Sentence <span class="text-danger">*</span></label>
                        <div class="input-group">
                          <textarea class="form-control example-sentence-text" x-model="ex.sentence"
                                    rows="2" required></textarea>
                          <select class="form-select example-sentence-lang" style="max-width: 90px;" x-model="ex.sentenceLang">
                            <template x-for="opt in languageOptions" :key="opt.code">
                              <option :value="opt.code" x-text="opt.code"
                                      :selected="opt.code === ex.sentenceLang"></option>
                            </template>
                          </select>
                        </div>
                      </div>

                      <!-- Translations -->
                      <div class="mb-2">
                        <label class="form-label">Translations</label>
                        <template x-for="(tr, ti) in ex.translations" :key="tr.id">
                          <div class="input-group mb-1">
                            <textarea class="form-control example-translation-text" x-model="tr.text"
                                      rows="1"></textarea>
                            <select class="form-select example-translation-lang" style="max-width: 90px;" x-model="tr.lang">
                              <template x-for="opt in languageOptions" :key="opt.code">
                                <option :value="opt.code" x-text="opt.code"
                                        :selected="opt.code === tr.lang"></option>
                              </template>
                            </select>
                            <button type="button" class="btn btn-sm btn-outline-danger"
                                    @click.prevent="removeTranslation(ex, tr.id)"
                                    x-show="ex.translations.length > 1">×</button>
                          </div>
                        </template>
                        <button type="button" class="btn btn-sm btn-outline-primary mt-1"
                                @click.prevent="addTranslation(ex)">
                          <i class="fas fa-plus"></i> Add Translation
                        </button>
                      </div>

                      <!-- Translation Type -->
                      <div class="mb-2">
                        <label class="form-label">Translation Type</label>
                        <select class="form-select dynamic-lift-range" x-model="ex.translationType"

                                data-range-id="translation-type" data-hierarchical="false" data-searchable="true">
                          <option value="">Select translation type</option>
                          <option value="literal">Literal</option>
                          <option value="free">Free/Idiomatic</option>
                        </select>
                      </div>

                      <!-- Reference -->
                      <div class="mb-2">
                        <label class="form-label">Reference</label>
                        <input type="text" class="form-control" x-model="ex.reference"
>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
              <button type="button" class="btn btn-sm btn-outline-primary add-example-btn mt-2"
                      @click.prevent="addExample(sense)">
                <i class="fas fa-plus"></i> Add Example
              </button>
            </div>

            <!-- Subsenses -->
            <div class="mb-3 subsenses-section">
              <label class="form-label"><i class="fas fa-level-down-alt"></i> Subsenses</label>
              <div class="subsenses-container">
                <template x-for="(sub, subi) in sense.subsenses" :key="sub.id">
                  <div class="subsense-item card mb-3 border-success" :data-subsense-index="subi">
                    <div class="card-header bg-success bg-opacity-10 py-2">
                      <div class="d-flex justify-content-between align-items-center">
                        <small><i class="fas fa-level-down-alt"></i> <span x-text="'Subsense ' + (subi + 1)"></span></small>
                        <button type="button" class="btn btn-sm btn-outline-danger remove-subsense-btn"
                                @click.prevent="removeSubsense(sense, sub.id)">
                          <i class="fas fa-times"></i> Remove
                        </button>
                      </div>
                    </div>
                    <div class="card-body p-3">
                      <!-- Subsense Definition -->
                      <div class="mb-3">
                        <label class="form-label">Definition <span class="text-danger">*</span></label>
                        <div class="multilingual-forms definition-forms">
                          <template x-for="df in sub.definitionForms" :key="df.id">
                            <div class="mb-2 language-form" :data-language="df.lang">
                              <div class="row">
                                <div class="col-md-3">
                                  <select class="form-select form-select-sm language-select" x-model="df.lang"
>
                                    <template x-for="opt in languageOptions" :key="opt.code">
                                      <option :value="opt.code" x-text="opt.label"
                                              :selected="opt.code === df.lang"></option>
                                    </template>
                                  </select>
                                </div>
                                <div class="col-md-9">
                                  <textarea class="form-control definition-text" rows="2" x-model="df.text"
                                            :placeholder="'Enter definition in ' + df.lang"></textarea>
                                </div>
                              </div>
                            </div>
                          </template>
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-primary mt-1"
                                @click.prevent="addRow(sub.definitionForms)">
                          <i class="fas fa-plus"></i> Add Language
                        </button>
                      </div>

                      <!-- Subsense Gloss -->
                      <div class="mb-3">
                        <label class="form-label">Gloss</label>
                        <div class="multilingual-forms gloss-forms">
                          <template x-for="gf in sub.glossForms" :key="gf.id">
                            <div class="mb-2 language-form" :data-language="gf.lang">
                              <div class="row">
                                <div class="col-md-3">
                                  <select class="form-select form-select-sm language-select" x-model="gf.lang"
>
                                    <template x-for="opt in languageOptions" :key="opt.code">
                                      <option :value="opt.code" x-text="opt.label"
                                              :selected="opt.code === gf.lang"></option>
                                    </template>
                                  </select>
                                </div>
                                <div class="col-md-9">
                                  <input type="text" class="form-control gloss-text" x-model="gf.text"
                                         :placeholder="'Enter gloss in ' + gf.lang">
                                </div>
                              </div>
                            </div>
                          </template>
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-primary mt-1"
                                @click.prevent="addRow(sub.glossForms)">
                          <i class="fas fa-plus"></i> Add Language
                        </button>
                      </div>

                      <!-- Subsense Grammatical Info -->
                      <div class="mb-3">
                        <label class="form-label">Part of Speech</label>
                        <select class="form-select form-select-sm" x-model="sub.grammaticalInfo">
                          <option value="">Select part of speech</option>
                          <template x-for="opt in grammaticalInfoOptions" :key="opt.key">
                            <option :value="opt.value" x-text="opt.label"></option>
                          </template>
                        </select>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
              <button type="button" class="btn btn-sm btn-outline-success add-subsense-btn mt-2"
                      @click.prevent="addSubsense(sense)">
                <i class="fas fa-plus"></i> Add Subsense
              </button>
            </div>

            <!-- Reversals (bilingual dictionary support) -->
            <div class="mb-3">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="form-label mb-0"><i class="fas fa-exchange-alt"></i> Reversals</label>
                <button type="button" class="btn btn-sm btn-outline-secondary add-reversal-btn"
                        @click.prevent="addReversal(sense)">
                  <i class="fas fa-plus"></i> Add Reversal
                </button>
              </div>
              <template x-for="(rev, ri) in sense.reversals" :key="rev.id">
                <div class="reversal-item card mb-2 border-info">
                  <div class="card-header bg-info bg-opacity-10 py-1">
                    <div class="d-flex justify-content-between align-items-center">
                      <small><i class="fas fa-exchange-alt"></i> <span x-text="'Reversal ' + (ri + 1)"></span></small>
                      <button type="button" class="btn btn-sm btn-outline-danger remove-reversal-btn"
                              @click.prevent="removeReversal(sense, rev.id)">
                        <i class="fas fa-times"></i>
                      </button>
                    </div>
                  </div>
                  <div class="card-body py-2">
                    <select class="form-select form-select-sm reversal-type-select"
                            x-model="rev.type">
                      <option value="">Select type (language code)</option>
                      <template x-for="opt in languageOptions" :key="opt.code">
                        <option :value="opt.code" x-text="opt.code + ' - ' + opt.label"
                                :selected="opt.code === rev.type"></option>
                      </template>
                    </select>
                    <div class="mt-2 input-group">
                      <span class="input-group-text" x-text="rev.type || '?'"></span>
                      <input type="text" class="form-control form-control-sm reversal-form-input"
                             :placeholder="'Form in ' + (rev.type || 'target language')"
                             x-model="rev.forms[rev.type]"></div>
                  </div>
                </div>
              </template>
              <div class="text-muted small" x-show="!sense.reversals || sense.reversals.length === 0">
                No reversals yet. Add reversals for bilingual dictionary support.
              </div>
            </div>

            <!-- Illustrations -->
            <div class="mb-3">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="form-label mb-0"><i class="fas fa-image"></i> Illustrations</label>
                <button type="button" class="btn btn-sm btn-outline-secondary add-illustration-btn"
                        @click.prevent="addIllustration(sense)">
                  <i class="fas fa-plus"></i> Add Illustration
                </button>
              </div>
              <template x-for="(ill, ii) in sense.illustrations" :key="ill.id">
                <div class="illustration-item card mb-2 border-success">
                  <div class="card-header bg-success bg-opacity-10 py-1">
                    <div class="d-flex justify-content-between align-items-center">
                      <small><i class="fas fa-image"></i> <span x-text="'Illustration ' + (ii + 1)"></span></small>
                      <button type="button" class="btn btn-sm btn-outline-danger remove-illustration-btn"
                              @click.prevent="removeIllustration(sense, ill.id)">
                        <i class="fas fa-times"></i>
                      </button>
                    </div>
                  </div>
                  <div class="card-body py-2">
                    <label class="form-label">Image Path/URL</label>
                    <input type="text" class="form-control form-control-sm"
                           x-model="ill.href"
                           placeholder="images/photo.jpg or https://example.com/image.jpg">
                  </div>
                </div>
              </template>
              <div class="text-muted small" x-show="!sense.illustrations || sense.illustrations.length === 0">
                No illustrations yet.
              </div>
            </div>

          </div>
        </div>
      </template>
    </div>
  </div>
</div>
