{# Alpine.js entry-level semantic relations component (§16.2.2) #}
{# Reuses the sense-relations pattern: type select from lexical-relation range, ref text input #}

<div x-data="entryRelations(window.__entryData || {})" class="card mb-4 relations-section">
    <div class="card-header bg-primary text-white">
        <div class="d-flex justify-content-between align-items-center">
            <h5 class="mb-0">
                <i class="fas fa-link"></i> Relations
                <i class="fas fa-info-circle ms-2 form-tooltip" 
                   data-bs-toggle="tooltip" 
                   data-bs-placement="top"
                   data-bs-html="true"
                   title="<strong>About Relations:</strong><br>Relations represent semantic connections between different lexical entries. Examples include synonyms (words with similar meanings), antonyms (opposite meanings), hyponyms (specific instances of a general term), and hypernyms (general terms for specific instances). These are distinct from variants that represent different forms of the same lexical item."></i>
            </h5>
            <button type="button" class="btn btn-sm btn-light add-relation-btn"
                    @click.prevent="addItem()">
                <i class="fas fa-plus"></i> Add Relation
            </button>
        </div>
    </div>
    <div class="card-body">
        <div id="relations-container">
            <template x-for="(rel, ri) in items" :key="rel.id">
                <div class="relation-item card mb-3">
                    <div class="card-header bg-primary text-white">
                        <div class="d-flex justify-content-between align-items-center">
                            <h6 class="mb-0">
                                <i class="fas fa-link me-2"></i>
                                Relation <span x-text="ri + 1"></span>
                            </h6>
                            <button type="button" class="btn btn-sm btn-light remove-relation-btn"
                                    @click.prevent="removeItem(rel.id)" title="Remove relation">
                                <i class="fas fa-trash text-danger"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Relation Type</label>
                                <select class="form-control lexical-relation-select"
                                        x-model="rel.type"
                                        required>
                                    <option value="">Select type</option>
                                    <template x-for="opt in relationTypeOptions" :key="opt.key">
                                        <option :value="opt.value" x-text="opt.label"></option>
                                    </template>
                                </select>
                                <div class="form-text">Type of semantic relation</div>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-bold">Target Entry ID</label>
                                <input type="text" class="form-control"
                                       x-model="rel.ref"
                                       placeholder="Target entry ID or GUID">
                                <div class="form-text">Reference to the related entry</div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <div class="text-muted" x-show="items.length === 0">
                <em>No semantic relations yet.</em>
            </div>
        </div>
    </div>
</div>
