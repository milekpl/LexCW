<!-- AI Actions for Entry Form -->
<div class="card mb-4 border-info">
    <div class="card-header bg-info bg-opacity-10">
        <h6 class="mb-0"><i class="fas fa-robot"></i> AI Assistant</h6>
    </div>
    <div class="card-body py-2">
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-info btn-sm" id="btn-ai-proofread"
                    title="AI will review this entry for errors, missing fields, and inconsistencies">
                <i class="fas fa-robot"></i> AI Proofread
            </button>
            <button type="button" class="btn btn-outline-primary btn-sm" id="btn-ai-draft"
                    title="AI will draft a new entry from a description">
                <i class="fas fa-magic"></i> AI Draft
            </button>
        </div>
        <div id="ai-results-panel"></div>
    </div>
</div>
