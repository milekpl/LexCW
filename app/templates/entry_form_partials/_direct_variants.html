{# Alpine.js direct variants (allomorphs) component (§16.2.3) #}
{# Manages <variant> elements with inline form, traits, grammatical_info, and grammatical_traits #}

<div x-data="entryDirectVariants(window.__entryData || {})" class="card mb-4 direct-variants-section">
    <div class="card-header bg-warning text-dark">
        <div class="d-flex justify-content-between align-items-center">
            <h5 class="mb-0">
                <i class="fas fa-copy"></i> Direct Variants (Allomorphs)
                <i class="fas fa-info-circle ms-2 form-tooltip"
                   data-bs-toggle="tooltip"
                   data-bs-placement="top"
                   data-bs-html="true"
                   title="<strong>About Direct Variants (Allomorphs):</strong><br>These represent direct variant forms with traits, like LIFT &lt;variant&gt; elements containing &lt;form&gt; and &lt;trait&gt; elements. They are different from variant relations which connect to other entries. Examples include 'grass roots' with morph-type='stem'."></i>
            </h5>
            <button type="button" class="btn btn-sm btn-light add-direct-variant-btn"
                    @click.prevent="addItem()">
                <i class="fas fa-plus"></i> Add Direct Variant
            </button>
        </div>
    </div>
    <div class="card-body">
        <div id="direct-variants-container">
            <template x-for="(dv, vi) in items" :key="dv.id">
                <div class="direct-variant-item card mb-3">
                    <div class="card-header bg-warning text-dark">
                        <div class="d-flex justify-content-between align-items-center">
                            <h6 class="mb-0">
                                <i class="fas fa-copy me-2"></i>
                                Direct Variant <span x-text="vi + 1"></span>
                            </h6>
                            <button type="button" class="btn btn-sm btn-light remove-direct-variant-btn"
                                    @click.prevent="removeItem(dv.id)" title="Remove direct variant">
                                <i class="fas fa-trash text-danger"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-8">
                                <!-- Variant form (multilingual) -->
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Variant Form</label>
                                    <div class="variant-form-languages">
                                        <template x-for="lang in getFormLangs(dv)" :key="lang">
                                            <div class="input-group mb-2">
                                                <span class="input-group-text" x-text="lang"></span>
                                                <input type="text" class="form-control"
                                                       x-model="dv.form[lang]"
                                                       :placeholder="'Variant form in ' + lang">
                                                <button type="button" class="btn btn-outline-danger btn-sm"
                                                        @click.prevent="removeFormLang(dv, lang)"
                                                        title="Remove this language">
                                                    <i class="fas fa-times"></i>
                                                </button>
                                            </div>
                                        </template>
                                    </div>
                                    <button type="button" class="btn btn-sm btn-outline-secondary"
                                            @click.prevent="addFormLang(dv)">
                                        <i class="fas fa-plus"></i> Add Language
                                    </button>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <!-- Variant traits -->
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Variant Traits</label>
                                    <div class="variant-traits">
                                        <template x-for="(tkey, tIdx) in getTraitKeys(dv)" :key="tkey">
                                            <div class="input-group mb-2">
                                                <input type="text" class="form-control form-control-sm trait-name-input"
                                                       style="max-width: 100px;"
                                                       :value="tkey"
                                                       placeholder="name"
                                                       @input="renameTrait(dv, tkey, $event.target.value)">
                                                <input type="text" class="form-control form-control-sm trait-value-input"
                                                       x-model="dv.traits[tkey]"
                                                       placeholder="value">
                                                <button type="button" class="btn btn-outline-danger btn-sm"
                                                        @click.prevent="removeTrait(dv, tkey)"
                                                        title="Remove this trait">
                                                    <i class="fas fa-times"></i>
                                                </button>
                                            </div>
                                        </template>
                                    </div>
                                    <button type="button" class="btn btn-sm btn-outline-secondary"
                                            @click.prevent="addTrait(dv)">
                                        <i class="fas fa-plus"></i> Add Trait
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Grammatical info and grammatical traits -->
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Grammatical Info</label>
                                    <input type="text" class="form-control"
                                           x-model="dv.grammatical_info"
                                           placeholder="Grammatical information">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Grammatical Traits</label>
                                    <div class="variant-grammatical-traits">
                                        <template x-for="(gtkey, gtIdx) in getGrammaticalTraitKeys(dv)" :key="gtkey">
                                            <div class="input-group mb-2">
                                                <input type="text" class="form-control form-control-sm grammatical-trait-input"
                                                       style="max-width: 100px;"
                                                       :value="gtkey"
                                                       placeholder="name"
                                                       @input="renameGrammaticalTrait(dv, gtkey, $event.target.value)">
                                                <input type="text" class="form-control form-control-sm"
                                                       x-model="dv.grammatical_traits[gtkey]"
                                                       placeholder="value">
                                                <button type="button" class="btn btn-outline-danger btn-sm"
                                                        @click.prevent="removeGrammaticalTrait(dv, gtkey)"
                                                        title="Remove grammatical trait">
                                                    <i class="fas fa-times"></i>
                                                </button>
                                            </div>
                                        </template>
                                    </div>
                                    <button type="button" class="btn btn-sm btn-outline-secondary"
                                            @click.prevent="addGrammaticalTrait(dv)">
                                        <i class="fas fa-plus"></i> Add Grammatical Trait
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <div class="text-muted" x-show="items.length === 0">
                <em>No direct variants yet.</em>
            </div>
        </div>
    </div>
</div>
