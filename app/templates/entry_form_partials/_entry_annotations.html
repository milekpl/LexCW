{# Alpine.js entry-level annotations component (§16.2) #}

<div x-data="entryAnnotations(window.__entryData || {})" class="card mt-4 annotations-section-entry">
    <div class="card-header bg-light">
        <div class="d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="fas fa-clipboard-list"></i> Entry Annotations</h5>
            <button type="button" class="btn btn-sm btn-outline-warning add-annotation-btn"
                    @click.prevent="addItem()"
                    title="Add an annotation for editorial workflow (review status, comments, etc.)">
                <i class="fas fa-plus"></i> Add Annotation
            </button>
        </div>
    </div>
    <div class="card-body">
        <div class="annotations-container">
            <template x-for="(ann, ai) in items" :key="ann.id">
                <div class="annotation-item card mb-3 border-warning">
                    <div class="card-header bg-warning bg-opacity-10">
                        <div class="d-flex justify-content-between align-items-center">
                            <span><i class="fas fa-tag"></i> <span x-text="'Annotation ' + (ai + 1)"></span></span>
                            <button type="button" class="btn btn-sm btn-outline-danger remove-annotation-btn"
                                    @click.prevent="removeItem(ann.id)">
                                <i class="fas fa-trash"></i> Remove
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- Name (required) -->
                        <div class="mb-3">
                            <label class="form-label">Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control annotation-name-input"
                                   x-model="ann.name"
                                   placeholder="e.g., review-status, comment, flagged" required>
                            <small class="form-text text-muted">
                                The name of this annotation (e.g., 'review-status', 'comment', 'flagged')
                            </small>
                        </div>

                        <!-- Value -->
                        <div class="mb-3">
                            <label class="form-label">Value</label>
                            <input type="text" class="form-control"
                                   x-model="ann.value"
                                   placeholder="e.g., approved, pending, rejected">
                        </div>

                        <!-- Who -->
                        <div class="mb-3">
                            <label class="form-label">Who</label>
                            <input type="text" class="form-control"
                                   x-model="ann.who"
                                   placeholder="e.g., editor@example.com, John Doe">
                            <small class="form-text text-muted">Person or email who created this annotation</small>
                        </div>

                        <!-- When (readonly timestamp) -->
                        <div class="mb-3">
                            <label class="form-label">When</label>
                            <input type="datetime-local" class="form-control"
                                   x-model="ann.when" readonly>
                            <small class="form-text text-muted">Timestamp when this annotation was created (auto-generated)</small>
                        </div>
                    </div>
                </div>
            </template>

            <div class="text-muted mb-3" x-show="items.length === 0">
                <em>No entry-level annotations yet.</em>
            </div>
        </div>
    </div>
</div>
