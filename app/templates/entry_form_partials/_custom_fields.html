{# Alpine.js entry-level custom fields component (§16.3 Phase B0) #}
{# Edit-only of existing LIFT <field type="..."> elements. No "add field" affordance. #}

<div x-data="entryCustomFields(window.__entryData || {})" class="card mb-4 custom-fields-section" x-show="Object.keys(fields).length > 0">
    <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
        <h5><i class="fas fa-cogs"></i> Custom Fields 
            <span class="input-group-text border-0 bg-transparent p-0 ms-1">
                <i class="fas fa-info-circle text-white" data-bs-toggle="tooltip" data-bs-placement="top" 
                   title="Custom fields defined in the LIFT data. These fields contain additional metadata and domain-specific information not covered by standard LIFT elements."></i>
            </span>
        </h5>
    </div>
    <div class="card-body">
        <template x-for="ft in Object.keys(fields)" :key="ft">
            <div class="custom-field-item mb-4 border rounded p-3 bg-light">
                <div class="row align-items-center mb-2">
                    <div class="col-md-8">
                        <label class="form-label fw-bold text-capitalize" x-text="ft.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())"></label>
                        <small class="text-muted d-block">Field Type: <span x-text="ft"></span></small>
                    </div>
                </div>
                
                <div class="multilingual-forms">
                    <template x-for="lang in Object.keys(fields[ft])" :key="lang">
                        <div class="mb-3 language-form">
                            <div class="row">
                                <div class="col-md-3">
                                    <label class="form-label">Language</label>
                                    <input type="text" class="form-control bg-white" :value="lang" readonly>
                                </div>
                                <div class="col-md-9">
                                    <label class="form-label">Content</label>
                                    <textarea class="form-control" rows="2"
                                              x-model="fields[ft][lang]"
                                              :placeholder="'Content in ' + lang"></textarea>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>
</div>
